<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <!--
    Verql app icon — Nightshift LIGHT variant.
    Mirrors build/icon.svg geometry (five V-bars) but on a pale canvas so the
    mark reads on light-mode dock, white documentation, paper print. The
    central bar keeps the brand mint accent; outer bars use a deep midnight
    fill so they hold contrast on a bright background.

    Always edit both files together — keep geometry identical, only swap
    the background/contrast layers.
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="68%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="55%"  stop-color="#EEF2F8"/>
      <stop offset="100%" stop-color="#D6DEEC"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="62%" r="48%">
      <stop offset="0%"   stop-color="#2BD9A3" stop-opacity="0.30"/>
      <stop offset="60%"  stop-color="#00C990" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frost" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1A2030"/>
      <stop offset="100%" stop-color="#3B4A6B"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5CE0BD"/>
      <stop offset="100%" stop-color="#00C990"/>
    </linearGradient>
  </defs>

  <g transform="translate(512 512) scale(0.805) translate(-512 -512)">
    <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
    <circle cx="512" cy="640" r="420" fill="url(#glow)"/>

    <!-- Five V-bars. All bottoms at y=860; tops descend toward the middle.
         Centered: outer bars at x=183 / x=735 leave equal 183px margins. -->
    <g>
      <!-- bar 1 (left, tallest) -->
      <rect x="183" y="220" width="106" height="640" rx="22" fill="url(#frost)"/>
      <!-- bar 2 (faded) -->
      <rect x="321" y="340" width="106" height="520" rx="22" fill="url(#frost)" opacity="0.78"/>
      <!-- bar 3 (middle, shortest — MINT, the brand accent) -->
      <rect x="459" y="500" width="106" height="360" rx="22" fill="url(#mint)"/>
      <!-- bar 4 (faded, mirror) -->
      <rect x="597" y="340" width="106" height="520" rx="22" fill="url(#frost)" opacity="0.78"/>
      <!-- bar 5 (right, tallest) -->
      <rect x="735" y="220" width="106" height="640" rx="22" fill="url(#frost)"/>
    </g>
  </g>
</svg>
