<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <!--
    Verql app icon — Nightshift edition.
    Five vertical bars whose tops trace a V over a deep midnight background,
    accented by an electric-mint glow. Mirrors the in-app VerqlMark.
      - rounded background, Apple's 22% radius
      - radial mint glow behind the bars so the mark reads at 16px
      - bars in cool frost with a hot mint inner column
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="68%">
      <stop offset="0%"   stop-color="#1A2030"/>
      <stop offset="55%"  stop-color="#0E121C"/>
      <stop offset="100%" stop-color="#06080F"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="62%" r="48%">
      <stop offset="0%"   stop-color="#2BD9A3" stop-opacity="0.40"/>
      <stop offset="60%"  stop-color="#00C990" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frost" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F3F6FB"/>
      <stop offset="100%" stop-color="#9DB0CC"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5CE0BD"/>
      <stop offset="100%" stop-color="#00C990"/>
    </linearGradient>
  </defs>

  <g transform="translate(512 512) scale(0.805) translate(-512 -512)">
    <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
    <circle cx="512" cy="640" r="420" fill="url(#glow)"/>

    <!-- Five V-bars. All bottoms at y=860; tops descend toward the middle. -->
    <g>
      <!-- bar 1 (left, tallest, frost) -->
      <rect x="216" y="220" width="106" height="640" rx="22" fill="url(#frost)"/>
      <!-- bar 2 (frost, faded) -->
      <rect x="354" y="340" width="106" height="520" rx="22" fill="url(#frost)" opacity="0.78"/>
      <!-- bar 3 (middle, shortest — MINT, the brand accent) -->
      <rect x="492" y="500" width="106" height="360" rx="22" fill="url(#mint)"/>
      <!-- bar 4 (frost, faded, mirror) -->
      <rect x="630" y="340" width="106" height="520" rx="22" fill="url(#frost)" opacity="0.78"/>
      <!-- bar 5 (right, tallest, frost) -->
      <rect x="768" y="220" width="106" height="640" rx="22" fill="url(#frost)"/>
    </g>
  </g>
</svg>
