<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="currentColor" stroke="none" aria-hidden="true">
  <!--
    Verql hero — empty-state / splash variant. The "V-bars" mark sized up,
    framed by a soft concentric ring + tonal halo. Inherits `currentColor`;
    opacity layers do the contrast lifting under masking.
  -->

  <!-- Outer breathing ring & halo -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="currentColor" stroke-width="1" opacity="0.10"/>
  <circle cx="100" cy="100" r="62" fill="currentColor" opacity="0.06"/>

  <!-- Bars (V shape, top edges descend toward middle) -->
  <g>
    <rect x="56"  y="50"  width="14" height="100" rx="2.5"/>
    <rect x="78"  y="78"  width="14" height="72"  rx="2.5" opacity="0.78"/>
    <rect x="100" y="106" width="14" height="44"  rx="2.5"/>
    <rect x="122" y="78"  width="14" height="72"  rx="2.5" opacity="0.78"/>
    <rect x="144" y="50"  width="14" height="100" rx="2.5"/>
  </g>
</svg>
