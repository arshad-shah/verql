# docker-compose.yml — Local test databases for verql
# Usage:
#   docker compose up -d        # Start all databases
#   docker compose down -v      # Stop and remove volumes
#
# Supported: PostgreSQL, MySQL, MongoDB, Redis
# Not included: SQLite (file-based, no server needed), Snowflake (cloud-only)

services:
  postgres:
    image: postgres:16-alpine
    container_name: verql-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: verql
      POSTGRES_PASSWORD: verql
      POSTGRES_DB: testdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/seed/postgres.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verql"]
      interval: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: verql-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: verql
      MYSQL_PASSWORD: verql
      MYSQL_DATABASE: testdb
    volumes:
      - mysqldata:/var/lib/mysql
      - ./docker/seed/mysql.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "verql", "-pverql"]
      interval: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: verql-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: verql
      MONGO_INITDB_ROOT_PASSWORD: verql
      MONGO_INITDB_DATABASE: testdb
    volumes:
      - mongodata:/data/db
      - ./docker/seed/mongo-init.js:/docker-entrypoint-initdb.d/seed.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "-u", "verql", "-p", "verql"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: verql-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass verql
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "verql", "ping"]
      interval: 5s
      retries: 5

  # One-shot seeder: Redis has no /docker-entrypoint-initdb.d, so a throwaway
  # container pipes sample keys (string/hash/list/set/zset/TTL) into the server
  # once it's healthy, then exits. Re-run anytime with `docker compose up redis-seed`.
  redis-seed:
    image: redis:7-alpine
    container_name: verql-redis-seed
    depends_on:
      redis:
        condition: service_healthy
    entrypoint: ["sh", "-c", "redis-cli -h redis -a verql < /seed/redis.txt && echo 'redis seeded'"]
    volumes:
      - ./docker/seed/redis.txt:/seed/redis.txt:ro
    restart: "no"

volumes:
  pgdata:
  mysqldata:
  mongodata:
  redisdata:
