appId: com.arshadshah.verql
productName: Verql
copyright: Copyright © 2026 Arshad Shah
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
asarUnpack:
  - "**/*.{node,dylib}"

# Publish target — releases go to the GitHub Releases of this repo only.
# CI guards on $GITHUB_REPOSITORY before invoking electron-builder, so a
# fork that triggers the workflow can't publish to this owner.
#
# This is the electron-updater feed. Only the Linux AppImage consumes it
# (latest-linux.yml is generated + uploaded here); the in-app updater
# (src/main/updater/auto-update.ts) is hard-guarded to AppImage installs.
# The Microsoft Store (MSIX) and the Snap Store manage their own updates, so
# their artifacts are NOT routed through this provider — see the per-target
# notes on `win` and `snap` below.
#
# `releaseType: draft` uploads assets to a *draft* GitHub Release so a
# maintainer can review before it goes live. electron-updater only sees a
# release once it's published, which doubles as the human gate that also
# triggers homebrew-bump.yml.
publish:
  provider: github
  owner: arshad-shah
  repo: verql
  releaseType: draft

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # gatekeeperAssess: false  # left at default; CI runs codesign + notarytool

# Windows ships two ways:
#   • appx (MSIX) → the Microsoft Store. The Store code-signs it and drives its
#     own updates; electron-builder generates no update feed for the appx target.
#   • nsis (.exe) → GitHub Releases as a direct download, with a latest.yml feed
#     that electron-updater consumes (the NSIS build is detected at runtime via
#     `!process.windowsStore`; see src/main/updater/auto-update.ts).
win:
  target:
    - target: appx
      arch: [x64]
    - target: nsis
      arch: [x64]
  # The GitHub .exe is shipped UNSIGNED (no code-signing cert). Without this,
  # electron-updater refuses to apply an update whose Authenticode signature it
  # can't verify, so auto-update would silently never install. Users still see a
  # SmartScreen warning on first run; the cosign-signed checksums on the release
  # provide provenance. (The Store MSIX is unaffected — the Store signs it.)
  verifyUpdateCodeSignature: false

# MSIX identity. These values come from Partner Center under Product
# management → Product identity, and MUST match it exactly or the Store
# rejects the upload (see .github/maintainers/release.md → "Microsoft Store").
appx:
  identityName: Arshadshah.verql                              # Package/Identity/Name
  publisher: CN=2ABEC305-C7D9-4693-92FC-165FCE8EEA94          # Package/Identity/Publisher
  publisherDisplayName: Arshad shah                           # Package/Properties/PublisherDisplayName
  applicationId: Verql                            # alphanumeric, no spaces/dots
  displayName: Verql
  backgroundColor: "#1e1e2e"
  languages:
    - en-US

linux:
  # AppImage → GitHub Releases (the electron-updater feed). Snap → Snap Store,
  # where snapd auto-refreshes installed snaps, so Snap is not part of the
  # electron-updater feed and is not published to GitHub (see `snap.publish`).
  target:
    - AppImage
    - snap
  category: Development
  # AppImage isn't signed at the binary level; the release pipeline
  # publishes a detached GPG signature for the sha256sums file instead.

snap:
  grade: stable
  confinement: strict
  # Snap is uploaded to the Snap Store by `snapcraft upload` in CI, never to
  # GitHub Releases. CI builds it with `--publish never`; this `publish: null`
  # is belt-and-suspenders so it can't inherit the top-level github provider.
  publish: null
