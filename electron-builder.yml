appId: com.arshadshah.verql
productName: Verql
copyright: Copyright © 2026 Arshad Shah
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
asarUnpack:
  - "**/*.{node,dylib}"

# No `publish:` provider block on purpose. release.yml uploads the release
# assets explicitly (with --publish=never); nothing consumes electron-builder
# update feeds — macOS/Linux self-update via Homebrew, Windows via the Store.
# (release.yml only attaches the .dmg/.AppImage, so any latest*.yml electron-builder
# may still emit during the build never reaches the GitHub release.)
#
# Artifact names are left at electron-builder's defaults, which produce the
# lowercase names the Homebrew tap already depends on:
#   verql-${version}-${arch}.dmg   (arm64 / x64)
#   verql-${version}-x86_64.AppImage
# scripts/render-homebrew.mjs and the cask/formula templates must match these.
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # gatekeeperAssess: false  # left at default; CI runs codesign + notarytool

# Windows ships ONE way: appx (MSIX) → the Microsoft Store. The Store
# code-signs the package and drives its own updates, so we need no code-signing
# cert and no update feed. (The MSIX is published by release.yml's
# publish-msstore job, not attached to the GitHub release.)
win:
  target:
    - target: appx
      arch: [x64]

# MSIX identity. These values come from Partner Center under Product
# management → Product identity, and MUST match it exactly or the Store rejects
# the upload (see .github/maintainers/release.md → "Microsoft Store").
appx:
  identityName: Arshadshah.verql                      # Package/Identity/Name
  publisher: CN=2ABEC305-C7D9-4693-92FC-165FCE8EEA94  # Package/Identity/Publisher
  publisherDisplayName: Arshad shah                   # Package/Properties/PublisherDisplayName
  applicationId: Verql                                # alphanumeric, no spaces/dots
  displayName: Verql
  backgroundColor: "#1e1e2e"
  languages:
    - en-US

linux:
  target:
    - AppImage
  category: Development
  # AppImage isn't signed at the binary level; the release pipeline publishes a
  # cosign signature over the sha256sums file instead. Installed on Linux via the
  # Homebrew formula (Formula/verql.rb), which downloads verql-${version}-x86_64.AppImage.
