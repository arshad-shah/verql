appId: com.arshadshah.verql
productName: Verql
copyright: Copyright © 2026 Arshad Shah
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
asarUnpack:
  - "**/*.{node,dylib}"

# Publish target — releases go to the GitHub Releases of this repo only.
# CI guards on $GITHUB_REPOSITORY before invoking electron-builder, so a
# fork that triggers the workflow can't publish to this owner.
publish:
  provider: github
  owner: arshad-shah
  repo: verql
  releaseType: release

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # gatekeeperAssess: false  # left at default; CI runs codesign + notarytool

# Windows ships two ways from the same build:
#   • appx (MSIX) → the Microsoft Store. The Store code-signs the package and
#     drives its own updates, so no code-signing cert is needed on our side and
#     electron-builder generates no update feed for this target.
#   • nsis (.exe) → GitHub Releases as a direct download, with a latest.yml feed
#     that electron-updater consumes. Shipped UNSIGNED — users see a SmartScreen
#     warning until reputation builds or a code-signing certificate is added.
# (See .github/maintainers/release.md → "Microsoft Store" for the full setup.)
win:
  target:
    - target: appx
      arch: [x64]
    - target: nsis
      arch: [x64]
  # Required so electron-updater applies updates to the unsigned NSIS build;
  # the Store MSIX is unaffected (the Store signs it).
  verifyUpdateCodeSignature: false

# MSIX identity. These values come from Partner Center under Product
# management → Product identity, and MUST match it exactly or the Store rejects
# the upload (see .github/maintainers/release.md → "Microsoft Store").
appx:
  identityName: Arshadshah.verql                      # Package/Identity/Name
  publisher: CN=2ABEC305-C7D9-4693-92FC-165FCE8EEA94  # Package/Identity/Publisher
  publisherDisplayName: Arshad shah                   # Package/Properties/PublisherDisplayName
  applicationId: Verql                                # alphanumeric, no spaces/dots
  displayName: Verql
  backgroundColor: "#1e1e2e"
  languages:
    - en-US

linux:
  target:
    - AppImage
  category: Development
  # AppImage isn't signed at the binary level; the release pipeline
  # publishes a detached GPG signature for the sha256sums file instead.
