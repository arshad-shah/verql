name: Bump Homebrew cask

# After a release is published (not just drafted), update the
# arshad-shah/homebrew-nova cask file to point at the new dmg + sha256s.
on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: homebrew-bump-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  bump:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Download macOS dmgs from the release
        env:
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$TAG" \
            -R "$REPO" \
            -p "nova-${VERSION}.dmg" \
            -p "nova-${VERSION}-arm64.dmg" \
            -D dmgs

      - name: Compute sha256s
        run: |
          ARM64_SHA=$(sha256sum "dmgs/nova-${VERSION}-arm64.dmg" | awk '{print $1}')
          X64_SHA=$(sha256sum "dmgs/nova-${VERSION}.dmg" | awk '{print $1}')
          echo "ARM64_SHA=$ARM64_SHA" >> "$GITHUB_ENV"
          echo "X64_SHA=$X64_SHA"     >> "$GITHUB_ENV"

      - name: Configure SSH deploy key
        env:
          DEPLOY_KEY: ${{ secrets.HOMEBREW_NOVA_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts

      - name: Clone tap and update cask
        run: |
          git clone git@github.com:arshad-shah/homebrew-nova.git tap
          cd tap
          awk -v ver="$VERSION" -v arm="$ARM64_SHA" -v x86="$X64_SHA" '
            /^  version / { print "  version \"" ver "\""; next }
            /sha256 "[a-f0-9]+"/ && !arm_done { sub(/"[a-f0-9]+"/, "\"" arm "\""); arm_done=1; print; next }
            /sha256 "[a-f0-9]+"/ &&  arm_done { sub(/"[a-f0-9]+"/, "\"" x86 "\""); print; next }
            { print }
          ' Casks/nova.rb > Casks/nova.rb.new
          mv Casks/nova.rb.new Casks/nova.rb

          if git diff --quiet Casks/nova.rb; then
            echo "Cask already up to date; nothing to push."
            exit 0
          fi

          git -c user.email='nova-release-bot@users.noreply.github.com' \
              -c user.name='Nova Release Bot' \
              add Casks/nova.rb
          git -c user.email='nova-release-bot@users.noreply.github.com' \
              -c user.name='Nova Release Bot' \
              commit -m "Bump Nova to v${VERSION}"
          git push origin main
