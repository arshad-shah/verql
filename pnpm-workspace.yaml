# pnpm explicitly recommends `node-linker=hoisted` for Electron apps:
# https://pnpm.io/settings#nodelinker
# Under the default isolated layout pnpm uses symlinks via .pnpm/, and
# electron-builder doesn't dereference deeply enough — transitive deps
# (mime-db, es-object-atoms, get-intrinsic, ...) get dropped from the
# packaged app.asar and the app crashes at launch with
# "Cannot find module 'X'". Hoisted layout produces a real flat
# node_modules — the same structure npm creates — which electron-builder
# packs reliably.
nodeLinker: hoisted

# Native modules that need post-install lifecycle scripts. pnpm 11 blocks
# arbitrary scripts by default; whitelist these explicitly.
allowBuilds:
  better-sqlite3: true
  cpu-features: true
  electron: true
  electron-winstaller: true
  esbuild: true
  ssh2: true

onlyBuiltDependencies:
  - better-sqlite3
  - electron
  - '@electron/rebuild'

# Pinned safe-versions for known-vulnerable transitives.
overrides:
  axios@<1.15.1: '>=1.15.1'
  form-data@<2.5.4: '>=2.5.4'
  fast-uri@<3.1.2: '>=3.1.2'
  # Pin xmldom to 0.8.x. The 0.9 line made mimeType mandatory in
  # parseFromString, which breaks `plist` (called by electron-builder when
  # parsing the Electron prebuild's Info.plist):
  #   "DOMParser.parseFromString: the provided mimeType 'undefined' is not valid"
  xmldom: 'npm:@xmldom/xmldom@~0.8.13'
  '@xmldom/xmldom': '~0.8.13'
  fast-xml-parser@<4.4.1: '>=4.4.1'
  fast-xml-builder@<1.1.7: '>=1.1.7'
  tough-cookie@<4.1.3: '>=4.1.3'
  yargs-parser@<5.0.1: '>=5.0.1'
  dompurify@<3.4.5: '>=3.4.5'
  follow-redirects@<1.16.0: '>=1.16.0'
  qs@<6.14.1: '>=6.14.1'
  phin@<3.7.1: '>=3.7.1'
  postcss@<8.5.10: '>=8.5.10'
  hono@<4.12.18: '>=4.12.18'
  ip-address@<10.2.0: '>=10.2.0'
  brace-expansion: '>=5.0.6'
  ws@<8.20.0: '>=8.20.0'
  'ws@>=8.0.0 <8.20.1': '>=8.20.1'
  fast-xml-parser@<5.7.0: '>=5.7.0'
