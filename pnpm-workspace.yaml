# pnpm 11 reads configuration from this file in addition to .npmrc, and for
# some keys it's the *only* place pnpm respects them — `shamefully-hoist`
# set in .npmrc is silently ignored under pnpm 11, but takes effect when set
# here as `shamefullyHoist`. We use this file as the single source of truth.

# Lay out node_modules in the flat npm-style format. The default pnpm layout
# symlinks deps via .pnpm/, and electron-builder doesn't dereference deeply
# enough — transitive deps (mime-db pulled in by snowflake-sdk → mime-types,
# etc.) get dropped from the packaged app.asar and the app crashes at launch
# with "Cannot find module 'mime-db'". Hoisting flattens everything so the
# default Node resolver finds it inside the asar.
shamefullyHoist: true
hoistPattern:
  - '*'
publicHoistPattern:
  - '*'

# Native modules that need post-install lifecycle scripts. pnpm 11 blocks
# arbitrary scripts by default; whitelist these explicitly.
allowBuilds:
  better-sqlite3: true
  cpu-features: true
  electron: true
  electron-winstaller: true
  esbuild: true
  ssh2: true

onlyBuiltDependencies:
  - better-sqlite3
  - electron
  - '@electron/rebuild'

# Pinned safe-versions for known-vulnerable transitives.
overrides:
  axios@<1.15.1: '>=1.15.1'
  form-data@<2.5.4: '>=2.5.4'
  fast-uri@<3.1.2: '>=3.1.2'
  xmldom: 'npm:@xmldom/xmldom@^0.8.13'
  '@xmldom/xmldom@<0.8.13': '>=0.8.13'
  fast-xml-parser@<4.4.1: '>=4.4.1'
  fast-xml-builder@<1.1.7: '>=1.1.7'
  tough-cookie@<4.1.3: '>=4.1.3'
  yargs-parser@<5.0.1: '>=5.0.1'
  dompurify@<3.4.5: '>=3.4.5'
  follow-redirects@<1.16.0: '>=1.16.0'
  qs@<6.14.1: '>=6.14.1'
  phin@<3.7.1: '>=3.7.1'
  postcss@<8.5.10: '>=8.5.10'
  hono@<4.12.18: '>=4.12.18'
  ip-address@<10.2.0: '>=10.2.0'
  brace-expansion: '>=5.0.6'
  ws@<8.20.0: '>=8.20.0'
  'ws@>=8.0.0 <8.20.1': '>=8.20.1'
  fast-xml-parser@<5.7.0: '>=5.7.0'
